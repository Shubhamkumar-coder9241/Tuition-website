<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Faculty - Tuition Website</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div id="main">
        <!-- Teacher Section -->
        <div id="teachersection">
            <section class="max-w-7xl mx-auto px-5 py-16">
                <!-- Badge -->
                <div class="flex justify-center mb-8">
                    <div class="inline-flex items-center gap-2 bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-semibold">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <span>OUR FACULTY</span>
                    </div>
                </div>

                <!-- Main Heading -->
                <div class="text-center mb-8">
                    <h1 class="text-5xl md:text-6xl font-bold">
                        Meet Our <span class="text-blue-600">Expert Faculty</span>
                    </h1>
                </div>

                <!-- Subtitle -->
                <div class="text-center max-w-3xl mx-auto">
                    <p class="text-lg text-gray-700 leading-relaxed">
                        Learn from highly experienced teachers who have guided thousands of students to success.
                    </p>
                </div>
            </section>
        </div>
    </div>

    <script src="js/teacher.js"></script>
</body>

</html>
